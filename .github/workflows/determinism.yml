# Per-tick checksum matrix (CLAUDE.md invariant #7, docs/phase-1-plan.md §6).
#
# The sim is float-free fixed-point so it must be BIT-IDENTICAL across CPU arch and
# compiler. This workflow runs the headless `sim-runner` on x86_64 (ubuntu, windows) and
# aarch64 (macOS Apple-Silicon AND native arm64 Linux) hosts, then diffs the checksum
# streams. Any divergence is a lockstep desync — a real bug. NEVER "fix" a failure here by
# narrowing the matrix or skipping a target (fix-ci skill / invariant #7). This matrix is
# ADD-ONLY: coverage may grow, never shrink.
#
# Target matrix note: the shipping matrix is {win-msvc, linux-gnu, android-arm64,
# ios-arm64}. The aarch64-unknown-linux-gnu entry (ubuntu-24.04-arm runner) covers the
# Android ship ISA at the sim level — same arm64-Linux ABI family as the device — so a
# desync on Android-family hardware surfaces in CI without an emulator. Device runs for
# Android/iOS still need emulators/adb and land in build-order step 6/7 (the on-device
# adb run is the device-specific confirmation, tracked separately).
# TODO(step6/7): add android-arm64 + ios-arm64 device runs.
name: determinism

on:
  push:
  pull_request:

defaults:
  run:
    # bash on every OS (Git Bash on Windows) so `>` redirects are UTF-8/LF everywhere —
    # otherwise PowerShell would write UTF-16 and the streams would falsely "diverge".
    shell: bash

jobs:
  checksum:
    name: sim checksum · ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-14 # Apple Silicon — the aarch64 side of the cross-arch check
            target: aarch64-apple-darwin
          # Native arm64 LINUX (GitHub's free ubuntu-24.04-arm runner — no qemu, no
          # cross-linker; aarch64-unknown-linux-gnu is the host target so rustup honors
          # rust-toolchain.toml directly). This covers the ANDROID SHIP ISA at the sim
          # level: the shipping arm64-Linux/Android family gets an in-CI checksum stream
          # diffed against x86_64 and aarch64-apple-darwin. The on-device adb run (step6)
          # is the device-specific confirmation, tracked separately — this entry is the
          # CI-level native-arm64-Linux proof. ADD-ONLY: never narrow/remove a matrix
          # entry to make a divergence go away — a desync is a real bug (invariant #7).
          - os: ubuntu-24.04-arm # native arm64 Linux — the Android ship ISA at sim level
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the exact compiler (a determinism input); rustup honors it.
      - name: Core determinism tests
        run: cargo test -p gonedark-core --release
      - name: Emit per-tick checksum stream
        run: cargo run -q -p gonedark-sim-runner --release -- 300 > "checksums-${{ matrix.target }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.target }}
          path: checksums-${{ matrix.target }}.txt

  compare:
    name: cross-arch checksum diff
    needs: checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: sums
      - name: Diff all streams (any divergence = desync = fail)
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(sums/**/checksums-*.txt)
          if [[ ${#files[@]} -lt 2 ]]; then
            echo "::error::expected >=2 checksum streams, found ${#files[@]}"; exit 1
          fi
          echo "comparing ${#files[@]} streams:"; printf '  %s\n' "${files[@]}"
          ref="${files[0]}"
          fail=0
          for f in "${files[@]}"; do
            if ! diff -q "$ref" "$f" >/dev/null; then
              echo "::error::checksum divergence between $ref and $f — lockstep desync (invariant #7)"
              diff "$ref" "$f" | head -20 || true
              fail=1
            fi
          done
          [[ $fail -eq 0 ]] && echo "all streams identical — determinism holds across arch"
          exit $fail
