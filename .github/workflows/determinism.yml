# Per-tick checksum matrix (CLAUDE.md invariant #7, docs/phase-1-plan.md §6).
#
# The sim is float-free fixed-point so it must be BIT-IDENTICAL across CPU arch and
# compiler. This workflow runs the headless `sim-runner` on x86_64 (ubuntu, windows) and
# aarch64 (macOS Apple-Silicon AND native arm64 Linux) hosts, then diffs the checksum
# streams. Any divergence is a lockstep desync — a real bug. NEVER "fix" a failure here by
# narrowing the matrix or skipping a target (fix-ci skill / invariant #7). This matrix is
# ADD-ONLY: coverage may grow, never shrink.
#
# Target matrix note: the shipping matrix is {win-msvc, linux-gnu, android-arm64,
# ios-arm64}. The aarch64-unknown-linux-gnu entry (ubuntu-24.04-arm runner) covers the
# Android ship ISA at the sim level — same arm64-Linux ABI family as the device — so a
# desync on Android-family hardware surfaces in CI without an emulator. Device runs for
# Android/iOS still need emulators/adb and land in build-order step 6/7 (the on-device
# adb run is the device-specific confirmation, tracked separately).
#
# Decision (step6/7) — why NOT to add device jobs here, and the ADD-ONLY posture:
#   * The two arm64 entries already present (aarch64-unknown-linux-gnu on
#     ubuntu-24.04-arm, aarch64-apple-darwin on macos-14) cover the Android and iOS
#     SHIP ISAs *at the sim level*: both ship targets are arm64, and the float-free
#     fixed-point sim is ABI/compiler-stable across them, so a per-tick desync on the
#     Android-family or Apple-Silicon ISA already fails this matrix without a device.
#   * A real on-DEVICE run (Android emulator / adb, iOS) is DEFERRED to device-farm CI:
#     GitHub-hosted runners can't host an Android emulator with hardware accel or a
#     physical iOS device, so the device confirmation lives outside this workflow (the
#     Phase-1 adb run on the Galaxy S24, D22, was the manual proof; a hosted device-farm
#     job is the eventual home).
#   * iOS is ADDITIONALLY blocked until an iOS BUILD TARGET exists (no iOS app/crate yet),
#     so even a device-farm iOS job has nothing to run until that lands.
# Therefore this matrix stays as-is for now: ADD-ONLY (coverage may grow, never shrink) —
# do NOT add device jobs here and do NOT alter any existing job's behavior (invariant #7).
name: determinism

on:
  push:
  pull_request:

# Top-level hardening only — the checksum matrix + diff logic below are untouched
# (invariant #7). These jobs only read the repo and exchange artifacts via the runtime
# token; contents:read is sufficient.
permissions:
  contents: read

concurrency:
  group: determinism-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # bash on every OS (Git Bash on Windows) so `>` redirects are UTF-8/LF everywhere —
    # otherwise PowerShell would write UTF-16 and the streams would falsely "diverge".
    shell: bash

jobs:
  checksum:
    name: sim checksum · ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-14 # Apple Silicon — the aarch64 side of the cross-arch check
            target: aarch64-apple-darwin
          # Native arm64 LINUX (GitHub's free ubuntu-24.04-arm runner — no qemu, no
          # cross-linker; aarch64-unknown-linux-gnu is the host target so rustup honors
          # rust-toolchain.toml directly). This covers the ANDROID SHIP ISA at the sim
          # level: the shipping arm64-Linux/Android family gets an in-CI checksum stream
          # diffed against x86_64 and aarch64-apple-darwin. The on-device adb run (step6)
          # is the device-specific confirmation, tracked separately — this entry is the
          # CI-level native-arm64-Linux proof. ADD-ONLY: never narrow/remove a matrix
          # entry to make a divergence go away — a desync is a real bug (invariant #7).
          - os: ubuntu-24.04-arm # native arm64 Linux — the Android ship ISA at sim level
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the exact compiler (a determinism input); rustup honors it.
      - name: Core determinism tests
        run: cargo test -p gonedark-core --release
      # ADD-ONLY (Phase 3 workstream B step 2): the net-sim-runner's own tests ride the same
      # arch matrix as core's. Additive — does not change the existing core test above.
      - name: Net-sim-runner determinism tests
        run: cargo test -p gonedark-net-sim-runner --release
      - name: Emit per-tick checksum stream
        run: cargo run -q -p gonedark-sim-runner --release -- 300 > "checksums-${{ matrix.target }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.target }}
          path: checksums-${{ matrix.target }}.txt
      # ADD-ONLY: the 2-peer lockstep agreed stream. A SEPARATELY-NAMED artifact so it is
      # NOT swept into the `checksums-*.txt` glob the existing `compare` job diffs — the net
      # stream is a distinct group, compared by its own `compare-net` job below (invariant #7,
      # docs/phase-3-plan.md §"Workstream A" CI note on separately-grouped streams).
      - name: Emit agreed 2-peer lockstep checksum stream
        run: cargo run -q -p gonedark-net-sim-runner --release -- 300 > "net-checksums-${{ matrix.target }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: net-checksums-${{ matrix.target }}
          path: net-checksums-${{ matrix.target }}.txt

  compare:
    name: cross-arch checksum diff
    needs: checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: sums
      - name: Diff all streams (any divergence = desync = fail)
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(sums/**/checksums-*.txt)
          if [[ ${#files[@]} -lt 2 ]]; then
            echo "::error::expected >=2 checksum streams, found ${#files[@]}"; exit 1
          fi
          echo "comparing ${#files[@]} streams:"; printf '  %s\n' "${files[@]}"
          ref="${files[0]}"
          fail=0
          for f in "${files[@]}"; do
            if ! diff -q "$ref" "$f" >/dev/null; then
              echo "::error::checksum divergence between $ref and $f — lockstep desync (invariant #7)"
              diff "$ref" "$f" | head -20 || true
              fail=1
            fi
          done
          [[ $fail -eq 0 ]] && echo "all streams identical — determinism holds across arch"
          exit $fail

  # ADD-ONLY (Phase 3 workstream B step 2): a SEPARATE cross-arch diff for the 2-peer
  # lockstep stream. Mirrors `compare`'s logic but globs `net-checksums-*.txt` only, so the
  # net stream is diffed across arch INDEPENDENTLY of the sim stream — and the existing
  # `compare` job is left entirely untouched (invariant #7). A divergence here is a
  # cross-client lockstep desync; never silence it by narrowing the matrix.
  compare-net:
    name: cross-arch net-checksum diff
    needs: checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: sums
      - name: Diff all net streams (any divergence = lockstep desync = fail)
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(sums/**/net-checksums-*.txt)
          if [[ ${#files[@]} -lt 2 ]]; then
            echo "::error::expected >=2 net-checksum streams, found ${#files[@]}"; exit 1
          fi
          echo "comparing ${#files[@]} net streams:"; printf '  %s\n' "${files[@]}"
          ref="${files[0]}"
          fail=0
          for f in "${files[@]}"; do
            if ! diff -q "$ref" "$f" >/dev/null; then
              echo "::error::net-checksum divergence between $ref and $f — lockstep desync (invariant #7)"
              diff "$ref" "$f" | head -20 || true
              fail=1
            fi
          done
          [[ $fail -eq 0 ]] && echo "all net streams identical — lockstep determinism holds across arch"
          exit $fail
