# Gradle wrapper config (text only).
#
# The wrapper JAR + the `gradlew` / `gradlew.bat` scripts are NOT committed in this
# scaffold (we do not fabricate binaries). Generate them on a machine with Gradle:
#
#     cd android && gradle wrapper --gradle-version 8.11
#
# That produces gradle/wrapper/gradle-wrapper.jar, gradlew, and gradlew.bat. Pin the
# version to one compatible with the AGP in build.gradle.kts (AGP 8.7 -> Gradle 8.9+).
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.11-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
